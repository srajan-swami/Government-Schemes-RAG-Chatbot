<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Government Schemes RAG Chatbot - Login to access AI-powered government scheme recommendations for Indian citizens.">
    <title>GovSchemes AI - Login</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: var(--space-4);
        }

        .login-container {
            width: 100%;
            max-width: 440px;
        }

        .login-header {
            text-align: center;
            margin-bottom: var(--space-10);
        }

        .login-logo {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--primary-500), var(--accent-500));
            border-radius: var(--radius-2xl);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto var(--space-6);
            box-shadow: 0 8px 30px rgba(37, 99, 235, 0.3);
            animation: pulse-glow 3s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 8px 30px rgba(37, 99, 235, 0.3); }
            50% { box-shadow: 0 8px 50px rgba(37, 99, 235, 0.5), 0 0 20px rgba(249, 115, 22, 0.2); }
        }

        .login-header h1 {
            font-size: var(--text-3xl);
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--surface-300));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: var(--space-2);
        }

        .login-header p {
            color: var(--surface-400);
            font-size: var(--text-base);
        }

        .login-card {
            padding: var(--space-10);
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: var(--space-6);
        }

        .login-form .form-input {
            padding: var(--space-4) var(--space-5);
            font-size: var(--text-base);
        }

        .login-form .btn {
            padding: var(--space-4);
            font-size: var(--text-base);
            width: 100%;
            margin-top: var(--space-2);
        }

        .login-toggle {
            text-align: center;
            margin-top: var(--space-6);
            color: var(--surface-400);
            font-size: var(--text-sm);
        }

        .login-toggle a {
            color: var(--primary-400);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: color var(--transition-fast);
        }

        .login-toggle a:hover {
            color: var(--primary-300);
        }

        .input-icon-wrap {
            position: relative;
        }

        .input-icon-wrap .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: var(--text-lg);
            pointer-events: none;
            opacity: 0.5;
        }

        .input-icon-wrap .form-input {
            padding-left: 48px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: var(--space-4);
            color: var(--surface-500);
            font-size: var(--text-xs);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--glass-border);
        }

        .features-strip {
            display: flex;
            justify-content: center;
            gap: var(--space-8);
            margin-top: var(--space-10);
            flex-wrap: wrap;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            color: var(--surface-500);
            font-size: var(--text-xs);
            font-weight: 500;
        }

        .feature-item .feature-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .feature-dot.blue { background: var(--primary-500); }
        .feature-dot.orange { background: var(--accent-500); }
        .feature-dot.green { background: var(--success-500); }

        .password-strength {
            height: 3px;
            border-radius: var(--radius-full);
            background: var(--surface-700);
            margin-top: var(--space-1);
            overflow: hidden;
            transition: all var(--transition-normal);
        }

        .password-strength .bar {
            height: 100%;
            border-radius: var(--radius-full);
            transition: all var(--transition-normal);
            width: 0%;
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="login-page">
        <div class="login-container">
            <!-- Header -->
            <div class="login-header fade-in">
                <div class="login-logo">🏛️</div>
                <h1 id="page-title">Welcome Back</h1>
                <p id="page-subtitle">Sign in to access Government Schemes AI Assistant</p>
            </div>

            <!-- Login Card -->
            <div class="login-card glass-card fade-in fade-in-delay-1">
                <form class="login-form" id="auth-form" onsubmit="handleAuth(event)">
                    <div class="form-group">
                        <label class="form-label" for="email-input">Email Address</label>
                        <div class="input-icon-wrap">
                            <span class="input-icon">📧</span>
                            <input type="email" id="email-input" class="form-input" 
                                   placeholder="you@example.com" required autocomplete="email">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password-input">Password</label>
                        <div class="input-icon-wrap">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="password-input" class="form-input" 
                                   placeholder="Enter your password" required autocomplete="current-password"
                                   oninput="updatePasswordStrength(this.value)">
                        </div>
                        <div class="password-strength" id="password-strength" style="display:none;">
                            <div class="bar" id="strength-bar"></div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg" id="auth-btn">
                        <span id="btn-text">Sign In</span>
                    </button>
                </form>

                <div class="login-toggle">
                    <span id="toggle-text">Don't have an account?</span>
                    <a id="toggle-link" onclick="toggleMode()">Create one</a>
                </div>
            </div>

            <!-- Features -->
            <div class="features-strip fade-in fade-in-delay-2">
                <div class="feature-item">
                    <div class="feature-dot blue"></div>
                    AI-Powered Recommendations
                </div>
                <div class="feature-item">
                    <div class="feature-dot orange"></div>
                    100+ Government Schemes
                </div>
                <div class="feature-item">
                    <div class="feature-dot green"></div>
                    Secure & Private
                </div>
            </div>
        </div>
    </div>

    <script src="/static/utils.js"></script>
    <script>
        let isLoginMode = true;

        // If already logged in, redirect
        if (getToken()) {
            window.location.href = '/chat';
        }

        function toggleMode() {
            isLoginMode = !isLoginMode;
            const title = document.getElementById('page-title');
            const subtitle = document.getElementById('page-subtitle');
            const btnText = document.getElementById('btn-text');
            const toggleText = document.getElementById('toggle-text');
            const toggleLink = document.getElementById('toggle-link');
            const pwStrength = document.getElementById('password-strength');
            const pwInput = document.getElementById('password-input');

            if (isLoginMode) {
                title.textContent = 'Welcome Back';
                subtitle.textContent = 'Sign in to access Government Schemes AI Assistant';
                btnText.textContent = 'Sign In';
                toggleText.textContent = "Don't have an account?";
                toggleLink.textContent = 'Create one';
                pwStrength.style.display = 'none';
                pwInput.setAttribute('autocomplete', 'current-password');
            } else {
                title.textContent = 'Create Account';
                subtitle.textContent = 'Join us to explore government schemes with AI';
                btnText.textContent = 'Create Account';
                toggleText.textContent = 'Already have an account?';
                toggleLink.textContent = 'Sign in';
                pwStrength.style.display = 'block';
                pwInput.setAttribute('autocomplete', 'new-password');
            }
        }

        function updatePasswordStrength(password) {
            if (isLoginMode) return;
            const bar = document.getElementById('strength-bar');
            let strength = 0;
            if (password.length >= 6) strength += 25;
            if (password.length >= 10) strength += 25;
            if (/[A-Z]/.test(password) && /[a-z]/.test(password)) strength += 25;
            if (/[0-9!@#$%^&*]/.test(password)) strength += 25;

            bar.style.width = strength + '%';
            if (strength <= 25) bar.style.background = '#ef4444';
            else if (strength <= 50) bar.style.background = '#eab308';
            else if (strength <= 75) bar.style.background = '#60a5fa';
            else bar.style.background = '#22c55e';
        }

        async function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('email-input').value.trim();
            const password = document.getElementById('password-input').value;
            const btn = document.getElementById('auth-btn');
            const btnText = document.getElementById('btn-text');

            if (!email || !password) {
                showToast('Please fill in all fields', 'error');
                return;
            }

            if (!isLoginMode && password.length < 6) {
                showToast('Password must be at least 6 characters', 'error');
                return;
            }

            // Show loading
            btn.disabled = true;
            btnText.innerHTML = '<div class="spinner"></div> Processing...';

            try {
                const endpoint = isLoginMode ? '/api/login' : '/api/register';
                const data = await apiPost(endpoint, { email, password }, false);
                
                setAuth(data.token, data.email);
                showToast(isLoginMode ? 'Login successful!' : 'Account created!', 'success');
                
                setTimeout(() => {
                    window.location.href = '/chat';
                }, 800);
            } catch (err) {
                showToast(err.message, 'error');
                btn.disabled = false;
                btnText.textContent = isLoginMode ? 'Sign In' : 'Create Account';
            }
        }
    </script>
</body>
</html>
